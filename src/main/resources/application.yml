# Server
server:
    port: 8080

# Spring
spring:
    application:
        name: processador-video
    profiles:
        active: dev
    jpa:
        hibernate:
            ddl-auto: none
    servlet:
        multipart:
            enabled: true
            max-file-size: 200MB
            max-request-size: 200MB

# Caminho temporário dos frames
storage:
    temp-directory: /tmp/frames

